services:
  - type: web
    name: malvin-c-vme
    env: node
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: OWNER_NUMBER
        sync: false
      - key: OWNER_NAME
        sync: false
      - key: BOT_NAME
        value: Malvin C VME
      - key: PREFIX
        value: "."
      - key: MODE
        value: public
      - key: SESSION_ID
        sync: false
